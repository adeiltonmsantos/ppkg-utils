{% csrf_token %}
<div class="fields-container">
{% for field in form %}
    <div class="form-field-collumn">
        {{ field.label_tag }}
        <div class="{% if field.widget_type == 'file' %}form-field-row{% endif %}">
            {{ field }}
        </div>
            {% if field.errors %}
            <div class="error-message-form">
                {{ field.errors }}
            </div>
        {% endif %}
    </div>
{% endfor %}
</div>
